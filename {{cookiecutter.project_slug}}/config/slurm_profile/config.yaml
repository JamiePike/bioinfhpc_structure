#================================================================
# Snakemake Slurm Profile Config
#================================================================
executor: slurm

# ----------------------------------------------------------------
# Global Job Handling Settings
# ----------------------------------------------------------------
jobs: 50 # Max number of simultaneous jobs submitted to Slurm
latency-wait: 60 # Seconds to wait for output files to sync across nodes
printshellcmds: true # Echo the executed shell scripts to stdout
keep-going: true # Don't fail the whole pipeline if one sample fails
restart-times: 1 # Automatically retry a failed job once

# ----------------------------------------------------------------
# Default Resource Allocations (Fallbacks if rules don't state them)
# ----------------------------------------------------------------
default-resources:
  slurm_partition: "normal" # CHANGE THIS to your cluster's standard partition
  runtime: 180 # Default wall-time limit in minutes (3 hours)
  mem_mb: 4000 # Default RAM allocation (4GB)
  nodes: 1
  tasks_per_node: 1

# ----------------------------------------------------------------
# High-Performance Logging Automation
# ----------------------------------------------------------------
# Slurm automatically writes stdout/stderr logs here. We route them cleanly
# straight to our high-speed project scratch space to avoid home quota clutter.
# Slurm tokens used:
#   %j = Job ID, %x = Name of the Snakemake rule
slurm_extra: "--output=project_scratch/tmp/logs/slurm/%x_%j.out --error=project_scratch/tmp/logs/slurm/%x_%j.err"

# ----------------------------------------------------------------
# Environment/Software Settings
# ----------------------------------------------------------------
use-conda: true # Automatically build/use environment per rule
use-singularity: true # Automatically deploy containers per rule if declared
# Set a clean cache directory on scratch so massive container images don't fill your home directory quota!
singularity-args: "--bind /scratch"
singularity-prefix: "project_scratch/tmp/containers"
